name: haulpoint
version: "1.0.0"
config-version: 2

profile: haulpoint

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Suggested layering. Fellows: build staging → intermediate → marts.
# This is a starting structure, not a constraint — justify any deviation.
models:
  haulpoint:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
