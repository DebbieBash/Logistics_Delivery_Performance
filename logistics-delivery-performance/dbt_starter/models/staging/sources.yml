version: 2

# Source definitions for the Cartwright Freightways raw sandbox.
# The generator loads these four tables into HAULPOINT.RAW.
# Point `database`/`schema` at wherever you ran the generator.
#
# Source freshness is wired as a starting point — tune the thresholds to a
# daily-load SLA and wire them into your orchestration design.

sources:
  - name: raw
    database: HAULPOINT   # override per your sandbox
    schema: RAW
    description: "Raw operational feeds, as emitted by the carrier source systems. Dirty on purpose."
    tables:
      - name: raw_orders
        description: "One row per order. Carries the promised delivery window (the SLA clock)."
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: order_id
            description: "Unique order identifier."
            # Fellow: is this actually unique + not null? Add tests and find out.

      - name: raw_deliveries
        description: "One row per delivery event, stitched from several carrier feeds (dupes + null timestamps live here)."
        loaded_at_field: attempted_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: delivery_id
            description: "Unique per delivery event."
          - name: delivered_at
            description: "Delivery completion time. NULLABLE — carrier feed dropouts. The headline modeling decision rides on how you treat these."

      - name: raw_warehouses
        description: "Origin DC master data. Small, slowly-changing. Carries lat/long for the optional distance stretch."
        loaded_at_field: opened_at   # note: master data — freshness is near-meaningless here, decide what to monitor

      - name: raw_drivers
        description: "One row per driver-employment record. DRIVER_NAME is NOT unique (rehires get a new DRIVER_ID)."
        loaded_at_field: hired_at
